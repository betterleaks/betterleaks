name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # v6.0.2 (https://github.com/actions/checkout/releases/tag/v6.0.2)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # v6.3.0 (https://github.com/actions/setup-go/releases/tag/v6.3.0)
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod

      # v4.0.0 (https://github.com/docker/setup-qemu-action/releases/tag/v4.0.0)
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      # v4.0.0 (https://github.com/docker/setup-buildx-action/releases/tag/v4.0.0)
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      # v4.1.0 (https://github.com/docker/login-action/releases/tag/v4.1.0)
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # v4.1.2 (https://github.com/sigstore/cosign-installer/releases/tag/v4.1.2)
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: "v3.0.6"

      - name: Check cosign version
        run: cosign version

      # v7.2.2 (https://github.com/goreleaser/goreleaser-action/releases/tag/v7.2.2)
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
